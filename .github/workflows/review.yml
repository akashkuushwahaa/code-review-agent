name: Security Review

# Runs the security-scoped review agent automatically on pull requests.
#
# Uses `pull_request` (NOT `pull_request_target`) on purpose: the token stays
# read-only for fork PRs and secrets are not exposed to untrusted fork code.
# The trade-off is that PRs from forks are not reviewed automatically — run
# those manually via the "Run workflow" button (workflow_dispatch) after you
# have inspected the diff. This is the correct posture for a security tool.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_url:
        description: "PR URL to review (e.g. https://github.com/owner/repo/pull/123)"
        required: true
        type: string
      dry_run:
        description: "Detect only — do not post comments"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Least privilege: read the repo, write PR comments. Nothing else.
permissions:
  contents: read
  pull-requests: write

# One in-flight review per PR; a newer push cancels the older run.
concurrency:
  group: security-review-${{ github.event.pull_request.number || github.event.inputs.pr_url }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run security review
        # Inputs are passed via env, never interpolated directly into the run
        # script — `github.event.*` values are untrusted and inlining them is a
        # shell-injection vector.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url || github.event.inputs.pr_url }}
          REVIEW_SEVERITY_THRESHOLD: ${{ vars.REVIEW_SEVERITY_THRESHOLD || 'medium' }}
          # Set repository variable REVIEW_DRY_RUN=true to validate wiring
          # without posting; the manual "Run workflow" input overrides it.
          REVIEW_DRY_RUN: ${{ github.event.inputs.dry_run || vars.REVIEW_DRY_RUN || 'false' }}
        run: python review.py
